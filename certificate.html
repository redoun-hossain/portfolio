<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AI Mastery Certificate | Redoun Hossain</title>
  <meta name="description" content="View Redoun Hossain's AI Mastery Certificate." />

  <link rel="stylesheet" href="css/style.css" />

  <style>
    .certificate-page{
      background:#f8fafc;
      min-height:100vh;
      padding:48px 0 70px;
    }

    .certificate-wrap{
      max-width:1000px;
      margin:0 auto;
      text-align:center;
    }

    .certificate-wrap h1{
      color:#581c87;
      margin:0 0 10px;
      font-size:clamp(1.8rem,4vw,2.6rem);
      font-weight:900;
    }

    .certificate-wrap p{
      color:#475569;
      margin:0 0 28px;
      line-height:1.7;
    }

    .certificate-viewer{
      background:#fff;
      border:2px solid #d8b4fe;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 12px 30px rgba(88,28,135,.14);
      padding:16px;
    }

    .certificate-image{
      display:block;
      width:100%;
      height:auto;
      border-radius:12px;
      border:1px solid #e2e8f0;
      background:#ffffff;
    }

    .certificate-actions{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      margin-top:24px;
    }

    .certificate-actions a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:13px 20px;
      border-radius:10px;
      font-weight:800;
      text-decoration:none;
      transition:.25s ease;
    }

    .certificate-open{
      background:#7c3aed;
      color:#fff;
      box-shadow:0 8px 18px rgba(124,58,237,.25);
    }

    .certificate-open:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 24px rgba(124,58,237,.32);
    }

    .certificate-download{
      background:#fff;
      color:#7c3aed;
      border:2px solid #7c3aed;
    }

    .certificate-download:hover{
      background:#f5f3ff;
      transform:translateY(-2px);
    }

    .certificate-note{
      margin-top:18px !important;
      color:#64748b !important;
      font-size:.9rem;
    }

    @media (max-width:640px){
      .certificate-page{
        padding:32px 0 50px;
      }

      .certificate-viewer{
        padding:10px;
        border-radius:14px;
      }

      .certificate-image{
        border-radius:10px;
      }

      .certificate-actions{
        flex-direction:column;
      }

      .certificate-actions a{
        width:100%;
      }
    }
  </style>
</head>

<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">Redoun Hossain</a>
      <a href="about.html" class="btn btn-outline">Back to About</a>
    </div>
  </header>

  <main class="certificate-page">
    <div class="container certificate-wrap">

      <h1>AI Mastery Certificate</h1>

      <p>
        Certificate of completion for AI agent development and n8n workflow automation.
      </p>

      <div class="certificate-viewer">
        <img
          src="certificates/Redoun-Hossain-AI-Mastery-Certificate.jpg"
          alt="AI Mastery Certificate - Redoun Hossain"
          class="certificate-image"
        />
      </div>

      <div class="certificate-actions">
        <a
          class="certificate-open"
          href="certificates/Redoun-Hossain-AI-Mastery-Certificate.pdf"
          target="_blank"
          rel="noopener noreferrer"
        >
          Open PDF
        </a>

        <a
          class="certificate-download"
          href="certificates/Redoun-Hossain-AI-Mastery-Certificate.pdf"
          download
        >
          Download Certificate
        </a>
      </div>

      <p class="certificate-note">
        Mobile browsers may not display PDF inside the page, so this page uses an image preview.
      </p>

    </div>
  </main>

</body>
</html>
